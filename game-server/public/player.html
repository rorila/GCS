<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GCS Game Platform</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            color: white;
        }

        /* Lobby Styles */
        #lobby {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px;
            height: 100%;
            overflow-y: auto;
        }

        #lobby h1 {
            font-size: 2.5rem;
            color: #4fc3f7;
            margin-bottom: 10px;
        }

        #lobby .subtitle {
            color: #64748b;
            margin-bottom: 40px;
        }

        .game-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 900px;
        }

        .game-card {
            background: #1e293b;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #334155;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .game-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        .game-card h3 {
            color: #f1f5f9;
            margin-bottom: 5px;
        }

        .game-card .meta {
            color: #64748b;
            font-size: 0.85rem;
            margin-bottom: 15px;
        }

        .game-card .buttons {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 500;
            transition: transform 0.1s, opacity 0.2s;
        }

        .btn:hover {
            opacity: 0.9;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-primary {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
        }

        .btn-secondary {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: white;
        }

        .empty-state {
            text-align: center;
            color: #64748b;
            padding: 60px 20px;
        }

        .empty-state h2 {
            color: #94a3b8;
            margin-bottom: 10px;
        }

        /* Upload Section */
        .upload-section {
            margin-top: 40px;
            padding: 30px;
            background: #1e293b;
            border-radius: 12px;
            border: 2px dashed #334155;
            text-align: center;
            max-width: 500px;
            width: 100%;
        }

        .upload-section h3 {
            margin-bottom: 15px;
            color: #94a3b8;
        }

        #file-input {
            display: none;
        }

        /* Stage (Game View) */
        #stage {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
            background: #000;
            overflow: hidden;
        }

        .game-object {
            position: absolute;
            user-select: none;
        }

        /* Back Button */
        #back-btn {
            display: none;
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #334155;
        }
    </style>
</head>

<body>
    <!-- Lobby View -->
    <div id="lobby">
        <h1>🎮 GCS Game Platform</h1>
        <p class="subtitle">Wähle ein Spiel zum Spielen</p>

        <div class="game-list" id="game-list">
            <div class="empty-state">
                <h2>Lade Spiele...</h2>
            </div>
        </div>

        <!-- Join Room Section -->
        <div class="upload-section" style="margin-top: 30px; border-color: #3b82f6;">
            <h3>🔗 Raum beitreten</h3>
            <p style="color: #64748b; margin-bottom: 15px; font-size: 0.9rem;">
                Gib den Raum-Code ein, den dir Spieler 1 mitgeteilt hat:
            </p>
            <div style="display: flex; gap: 10px; justify-content: center;">
                <input type="text" id="room-code-input" placeholder="XXXXXX" maxlength="6" style="width: 120px; padding: 10px 15px; font-size: 1.2rem; 
                              text-align: center; text-transform: uppercase;
                              border: 2px solid #334155; border-radius: 8px;
                              background: #0f172a; color: white;
                              letter-spacing: 3px;">
                <button class="btn btn-secondary" onclick="joinRoom()">
                    Beitreten
                </button>
            </div>
        </div>

        <div class="upload-section">
            <h3>📤 Spiel hochladen</h3>
            <input type="file" id="file-input" accept=".json">
            <button class="btn btn-secondary" onclick="document.getElementById('file-input').click()">
                JSON-Datei auswählen
            </button>
        </div>
    </div>

    <!-- Game Stage -->
    <div id="stage"></div>
    <button id="back-btn" class="btn btn-secondary" onclick="showLobby()">← Zurück zur Lobby</button>

    <script>
        // ═══════════════════════════════════════════════════════════════
        // Game Platform Client
        // ═══════════════════════════════════════════════════════════════

        const lobby = document.getElementById('lobby');
        const stage = document.getElementById('stage');
        const backBtn = document.getElementById('back-btn');
        const gameList = document.getElementById('game-list');
        const fileInput = document.getElementById('file-input');

        let currentRuntime = null;

        // Initialize on page load
        init();

        async function init() {
            const params = new URLSearchParams(window.location.search);
            const gameFile = params.get('game');
            const hostMode = params.get('host') === 'true';
            const roomCode = params.get('room');

            // If we have URL parameters for game, hide lobby and let runtime handle it
            if (gameFile || roomCode) {
                console.log('[Platform] URL parameters detected, loading game directly');
                lobby.style.display = 'none';
                stage.style.display = 'block';
                backBtn.style.display = 'block';

                // Load the game to get runtime version
                if (gameFile) {
                    try {
                        const resp = await fetch(`/platform/games/${gameFile}`);
                        const project = await resp.json();
                        const version = project.meta?.runtimeVersion || '1.0.0';

                        // Setup stage
                        const grid = project.stage.grid;
                        stage.style.width = (grid.cols * grid.cellSize) + 'px';
                        stage.style.height = (grid.rows * grid.cellSize) + 'px';
                        stage.style.background = grid.backgroundColor || '#000';

                        // Expose project for runtime
                        window.PROJECT = project;

                        // Load runtime - it will handle room creation/joining
                        await loadRuntime(version);
                        console.log('[Platform] Runtime loaded, triggering DOMContentLoaded');
                        document.dispatchEvent(new Event('DOMContentLoaded'));
                    } catch (err) {
                        console.error('[Platform] Error loading game:', err);
                        showLobby();
                    }
                } else if (roomCode) {
                    // Joining a room - load default runtime
                    await loadRuntime('1.0.0');
                    console.log('[Platform] Runtime loaded for room join');
                    document.dispatchEvent(new Event('DOMContentLoaded'));
                }
            } else {
                // No URL params, show lobby
                loadGameList();
            }
        }

        async function loadGameList() {
            try {
                const resp = await fetch('/platform/games');
                const games = await resp.json();

                if (games.length === 0) {
                    gameList.innerHTML = `
                    <div class="empty-state">
                        <h2>Keine Spiele vorhanden</h2>
                        <p>Lade ein Spiel hoch, um loszulegen!</p>
                    </div>
                `;
                    return;
                }

                gameList.innerHTML = games.map(game => `
                <div class="game-card">
                    <h3>${escapeHtml(game.name)}</h3>
                    <div class="meta">
                        von ${escapeHtml(game.author)} • 
                        Runtime v${game.runtimeVersion || '1.0.0'}
                    </div>
                    <div class="buttons">
                        <button class="btn btn-primary" onclick="playGame('${game.file}', false)">
                            🎮 Einzelspieler
                        </button>
                        <button class="btn btn-secondary" onclick="playGame('${game.file}', true)">
                            👥 Mehrspieler
                        </button>
                    </div>
                </div>
            `).join('');
            } catch (err) {
                console.error('Error loading games:', err);
                gameList.innerHTML = `
                <div class="empty-state">
                    <h2>Fehler beim Laden</h2>
                    <p>${err.message}</p>
                </div>
            `;
            }
        }

        async function playGame(filename, multiplayer) {
            try {
                // For multiplayer, we need to use URL navigation so the runtime
                // properly handles room creation via the network module
                if (multiplayer) {
                    // Navigate to player with host parameter
                    window.location.href = `?game=${filename}&host=true`;
                    return;
                }

                // Single player: Load and run directly
                const resp = await fetch(`/platform/games/${filename}`);
                const project = await resp.json();

                // Get runtime version
                const version = project.meta?.runtimeVersion || '1.0.0';

                // Load runtime if needed
                if (!currentRuntime || currentRuntime.version !== version) {
                    await loadRuntime(version);
                }

                // Show game stage
                lobby.style.display = 'none';
                stage.style.display = 'block';
                backBtn.style.display = 'block';

                // Setup stage dimensions
                const grid = project.stage.grid;
                const stageWidth = grid.cols * grid.cellSize;
                const stageHeight = grid.rows * grid.cellSize;
                stage.style.width = stageWidth + 'px';
                stage.style.height = stageHeight + 'px';
                stage.style.background = grid.backgroundColor || '#000';

                // Initialize game via runtime
                window.PROJECT = project;

                // Trigger runtime startup
                if (window.player) {
                    window.player = null;
                }
                const event = new Event('DOMContentLoaded');
                document.dispatchEvent(event);

            } catch (err) {
                console.error('Error starting game:', err);
                alert('Fehler beim Starten: ' + err.message);
            }
        }

        async function loadRuntime(version) {
            return new Promise((resolve, reject) => {
                // Remove old runtime script if exists
                const oldScript = document.getElementById('runtime-script');
                if (oldScript) oldScript.remove();

                const script = document.createElement('script');
                script.id = 'runtime-script';
                script.src = `/runtimes/${version}`;
                script.onload = () => {
                    currentRuntime = { version };
                    console.log(`Runtime v${version} loaded`);
                    resolve();
                };
                script.onerror = () => reject(new Error(`Failed to load runtime v${version}`));
                document.head.appendChild(script);
            });
        }

        function showLobby() {
            // Stop current game
            if (window.player && window.player.runtime) {
                window.player.runtime.stop();
            }
            stage.innerHTML = '';
            stage.style.display = 'none';
            backBtn.style.display = 'none';
            lobby.style.display = 'flex';
            loadGameList();
        }

        // File upload handler
        fileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            try {
                const text = await file.text();
                const content = JSON.parse(text);

                // Validate it's a game project
                if (!content.meta || !content.stage) {
                    throw new Error('Ungültiges Spielformat');
                }

                // Upload to server
                const resp = await fetch('/platform/games', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        filename: file.name,
                        content: content
                    })
                });

                const result = await resp.json();
                if (result.success) {
                    alert(`Spiel "${content.meta.name}" erfolgreich hochgeladen!`);
                    loadGameList();
                } else {
                    throw new Error(result.error);
                }
            } catch (err) {
                alert('Upload fehlgeschlagen: ' + err.message);
            }

            fileInput.value = '';
        });

        function joinRoom() {
            const input = document.getElementById('room-code-input');
            const code = input.value.trim().toUpperCase();

            if (code.length !== 6) {
                alert('Bitte gib einen 6-stelligen Raum-Code ein.');
                return;
            }

            // Navigate to join the room
            window.location.href = `?room=${code}`;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>

</html>
