<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Standalone Preview IFrame</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #0f172a;
        }
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }
        #stage-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        #run-stage {
            position: relative;
            background: #ffffff;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border-radius: 4px;
            overflow: hidden;
            transform-origin: center center;
            flex-shrink: 0;
        }
        .game-object {
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
            overflow: hidden;
            user-select: none;
        }
        
        #iframe-loading-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(15, 23, 42, 0.9);
            color: #4facfe;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 1.2rem;
            z-index: 9999;
            transition: opacity 0.3s;
        }
    </style>
</head>
<body>
    <div id="iframe-loading-overlay">Warte auf Projektdaten (postMessage) ...</div>
    <div id="stage-container">
        <div id="run-stage"></div>
    </div>
    
    <script>
        // Lese Projekt synchron vom Iframe-Element, falls vom Editor gesetzt
        console.log('[IFrame Runner] DIAG: window.location =', window.location.href);
        console.log('[IFrame Runner] DIAG: window.location.protocol =', window.location.protocol);
        console.log('[IFrame Runner] DIAG: window.location.origin =', window.location.origin);
        console.log('[IFrame Runner] DIAG: window.frameElement =', !!window.frameElement);
        console.log('[IFrame Runner] DIAG: document.baseURI =', document.baseURI);
        
        if (window.frameElement && window.frameElement._injectedProject) {
            window.PROJECT = window.frameElement._injectedProject;
            console.log('[IFrame Runner] Projekt synchron geladen. Stages:', window.PROJECT.stages?.length);
            
            // DIAGNOSE: Alle Objekte mit Bildpfaden dumpen
            window.PROJECT.stages?.forEach(function(stage) {
                var imageObjs = (stage.objects || []).filter(function(o) { return o.backgroundImage || o.src; });
                if (imageObjs.length > 0) {
                    console.log('[IFrame Runner] DIAG: Stage "' + stage.name + '" hat ' + imageObjs.length + ' Objekte mit Bildern:');
                    imageObjs.forEach(function(o) {
                        console.log('  → ' + o.name + ' (' + o.className + '): "' + (o.backgroundImage || o.src || '').substring(0, 120) + '"');
                    });
                }
            });
            
            const overlay = document.getElementById('iframe-loading-overlay');
            if (overlay) overlay.style.display = 'none';
        } else {
            console.warn('[IFrame Runner] DIAG: window.frameElement oder _injectedProject fehlt! frameElement=', window.frameElement);
        }
    </script>
    <!-- Lade den Standalone Controller -->
    <script>
        console.log('[IFrame Runner] DIAG: Lade runtime-standalone.js ...');
    </script>
    <script src="./runtime-standalone.js" onerror="console.error('[IFrame Runner] FEHLER: runtime-standalone.js konnte NICHT geladen werden! src=./runtime-standalone.js. Check: Das Skript muss über den Vite-Dev-Server erreichbar sein.');"></script>
    <script>
        console.log('[IFrame Runner] DIAG: runtime-standalone.js geladen?', typeof window.startStandalone === 'function' ? 'JA' : 'NEIN (startStandalone fehlt)');
    </script>

    <script>
        console.log("[IFrame Runner] Bereit. Warte auf START_RUN.");
        
        window.addEventListener('message', (event) => {
            // Aus Sicherheitsgruenden origin checken (hier im Dev-Setup ueberspringen oder loggen)
            if (event.data && event.data.type === 'START_RUN') {
                const project = event.data.project;
                console.log("[IFrame Runner] Projekt empfangen:", project.meta?.name);
                
                // Overlay ausblenden
                const overlay = document.getElementById('iframe-loading-overlay');
                if (overlay) overlay.style.opacity = '0';
                setTimeout(() => { if (overlay) overlay.style.display = 'none'; }, 300);

                // Stage Dimensionen anpassen (Aus GCS Format)
                const mainStage = project.stages?.find(s => s.type === 'main') || project.stages?.[0] || project.stage;
                if (mainStage && mainStage.grid) {
                    const grid = mainStage.grid;
                    const stageWidth = grid.cols * grid.cellSize;
                    const stageHeight = grid.rows * grid.cellSize;
                    const runStage = document.getElementById('run-stage');
                    if (runStage) {
                        runStage.style.width = stageWidth + 'px';
                        runStage.style.height = stageHeight + 'px';
                        if (grid.backgroundColor) {
                            runStage.style.backgroundColor = grid.backgroundColor;
                        }
                    }
                }

                // Globale Variable setzen fÃ¼r Standalone-Script
                window.PROJECT = project;
                
                if (typeof window.startStandalone === 'function') {
                    window.startStandalone(project);
                } else {
                    console.error("[IFrame Runner] Standalone Runtime 'startStandalone' nicht gefunden!");
                    document.body.innerHTML += '<h2 style="color:red;position:absolute;top:20px;left:20px;z-index:10000;">Error: Runtime-Standalone fehlt!</h2>';
                }
            }
        });
        
        // Sende READY signal zurueck an den Editor
        window.parent.postMessage({ type: 'IFRAME_READY' }, '*');
    </script>
</body>
</html>
